<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Akinrinade Mayowa — Web Developer & AI Expert from Nigeria. Building modern, high-performance web experiences.">
  <title>Akinrinade Mayowa · Developer & AI Expert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ============================================
       DESIGN TOKENS
    ============================================ */
    :root {
      --bg-base:        #07090f;
      --bg-surface:     #0c1120;
      --bg-elevated:    #121c32;
      --bg-glass:       rgba(12, 17, 32, 0.75);
      --accent:         #f9c822;
      --accent-dim:     rgba(249, 200, 34, 0.12);
      --accent-glow:    rgba(249, 200, 34, 0.3);
      --amber:          #e07d00;
      --text-primary:   #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted:     #4b5568;
      --border:         rgba(249, 200, 34, 0.12);
      --border-subtle:  rgba(255, 255, 255, 0.07);
      --radius-sm:      8px;
      --radius-md:      14px;
      --radius-lg:      22px;
      --radius-pill:    999px;
      --shadow-card:    0 8px 40px rgba(0, 0, 0, 0.55);
      --shadow-glow:    0 0 50px rgba(249, 200, 34, 0.12);
      --transition:     all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --font-display:   'Sora', sans-serif;
      --font-body:      'Inter', sans-serif;
      --font-mono:      'JetBrains Mono', monospace;
    }

    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── SCROLL PROGRESS ── */
    #scroll-progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--amber));
      z-index: 9999;
      transition: width 0.08s linear;
    }

    /* ── BACK TO TOP ── */
    #back-top {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--accent); color: #000;
      border: none; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 24px var(--accent-glow);
      opacity: 0; transform: translateY(20px) scale(0.8);
      transition: var(--transition);
    }
    #back-top.visible { opacity: 1; transform: translateY(0) scale(1); }
    #back-top:hover { background: #fff; transform: translateY(-3px) scale(1); }

    /* ============================================
       NAVBAR
    ============================================ */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.4rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      transition: var(--transition);
    }
    #navbar.scrolled {
      background: rgba(7, 9, 15, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0.9rem 2.5rem;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-weight: 800; font-size: 1.25rem;
      color: var(--text-primary); text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links {
      display: flex; gap: 2.5rem;
      list-style: none; align-items: center;
    }
    .nav-links a {
      text-decoration: none; color: var(--text-secondary);
      font-size: 0.88rem; font-weight: 500;
      transition: color 0.25s;
      position: relative; padding-bottom: 3px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--text-primary); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--accent) !important;
      color: #000 !important;
      padding: 0.5rem 1.3rem !important;
      border-radius: var(--radius-pill) !important;
      font-weight: 700 !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover {
      background: #fff !important;
      box-shadow: 0 0 24px var(--accent-glow);
      color: #000 !important;
    }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 6px;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px;
      background: var(--text-primary); border-radius: 2px;
      transition: var(--transition);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── MOBILE MENU ── */
    #mobileMenu {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: var(--bg-surface);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 2.5rem;
    }
    #mobileMenu.open { display: flex; }
    #mobileMenu a {
      text-decoration: none; color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800;
      transition: color 0.25s;
    }
    #mobileMenu a:hover { color: var(--accent); }

    /* ============================================
       HERO
    ============================================ */
    #hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center;
      overflow: hidden; padding: 0 2.5rem;
    }
    #hero-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .hero-gradient-overlay {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 50%, rgba(249,200,34,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 10% 80%, rgba(224,125,0,0.05) 0%, transparent 60%),
        linear-gradient(to bottom, transparent 60%, var(--bg-base) 100%);
    }
    .hero-content {
      position: relative; z-index: 1;
      max-width: 720px; padding-top: 7rem;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: var(--accent-dim); border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.3rem 1.1rem;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); font-family: var(--font-mono);
      margin-bottom: 1.8rem;
      animation: fadeDown 0.8s ease both;
    }
    .hero-eyebrow::before {
      content: ''; width: 8px; height: 8px;
      background: #22c55e; border-radius: 50%;
      animation: livePulse 2s infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }
    .hero-name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7.5vw, 5.5rem);
      font-weight: 800; line-height: 1.02;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      animation: fadeUp 0.9s 0.1s ease both;
    }
    .hero-name .name-accent { color: var(--accent); }
    .hero-role {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.8vw, 1.7rem);
      font-weight: 600;
      color: var(--text-secondary);
      margin: 1.1rem 0 1.6rem;
      animation: fadeUp 0.9s 0.2s ease both;
      min-height: 2.4em;
    }
    #typed-text { color: var(--accent); }
    .typed-cursor {
      color: var(--accent);
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .hero-desc {
      color: var(--text-secondary);
      max-width: 540px; font-size: 1.05rem; line-height: 1.85;
      animation: fadeUp 0.9s 0.3s ease both;
    }
    .hero-actions {
      display: flex; gap: 1rem; margin-top: 2.5rem; flex-wrap: wrap;
      animation: fadeUp 0.9s 0.4s ease both;
    }
    .hero-stats {
      display: flex; gap: 3rem; margin-top: 3.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border-subtle);
      animation: fadeUp 0.9s 0.5s ease both;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800;
      color: var(--text-primary);
    }
    .stat-num em { color: var(--accent); font-style: normal; }
    .stat-lbl {
      font-size: 0.78rem; color: var(--text-muted);
      letter-spacing: 0.07em; text-transform: uppercase; margin-top: 0.1rem;
    }

    /* scroll indicator */
    .hero-scroll-hint {
      position: absolute; bottom: 2.5rem; left: 50%;
      transform: translateX(-50%); z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      animation: fadeUp 1s 1.2s ease both;
    }
    .scroll-indicator {
      width: 26px; height: 42px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      display: flex; justify-content: center; padding-top: 6px;
    }
    .scroll-dot {
      width: 4px; height: 8px; border-radius: 2px;
      background: var(--accent);
      animation: scrollDot 1.6s ease-in-out infinite;
    }
    @keyframes scrollDot {
      0% { transform: translateY(0); opacity: 1; }
      75% { transform: translateY(12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 0; }
    }
    .scroll-lbl {
      font-size: 0.68rem; color: var(--text-muted);
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: var(--font-mono);
    }

    /* ============================================
       SHARED LAYOUT
    ============================================ */
    .container { width: 90%; max-width: 1200px; margin: 0 auto; }
    section { padding: 6rem 0; }

    .section-eyebrow {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.72rem; font-weight: 500;
      color: var(--accent); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 0.8rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 4vw, 2.9rem);
      font-weight: 800; letter-spacing: -0.03em;
      line-height: 1.12; color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .section-desc {
      color: var(--text-secondary);
      font-size: 1rem; line-height: 1.85;
      max-width: 560px;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: var(--accent); color: #000;
      padding: 0.85rem 1.8rem; border-radius: var(--radius-pill);
      font-weight: 700; font-size: 0.93rem;
      text-decoration: none; border: none; cursor: pointer;
      transition: var(--transition); font-family: var(--font-body);
    }
    .btn-primary:hover {
      background: #fff;
      box-shadow: 0 8px 32px var(--accent-glow);
      transform: translateY(-2px);
    }
    .btn-outline {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: transparent; color: var(--text-primary);
      padding: 0.85rem 1.8rem; border-radius: var(--radius-pill);
      font-weight: 600; font-size: 0.93rem;
      text-decoration: none; border: 1px solid var(--border-subtle);
      cursor: pointer; transition: var(--transition); font-family: var(--font-body);
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent); background: var(--accent-dim);
      transform: translateY(-2px);
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0; transform: translateY(36px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.1s; }
    .d2 { transition-delay: 0.2s; }
    .d3 { transition-delay: 0.3s; }
    .d4 { transition-delay: 0.4s; }

    /* ============================================
       ABOUT
    ============================================ */
    #about { background: var(--bg-base); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 5rem; align-items: start;
    }
    .about-text p {
      color: var(--text-secondary); font-size: 1rem;
      line-height: 1.85; margin-bottom: 1.2rem;
    }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.55rem; margin: 1.8rem 0; }
    .tag {
      background: var(--accent-dim); border: 1px solid var(--border);
      color: var(--accent);
      padding: 0.3rem 0.9rem; border-radius: var(--radius-pill);
      font-size: 0.77rem; font-weight: 500; font-family: var(--font-mono);
      transition: var(--transition);
    }
    .tag:hover { background: var(--accent); color: #000; }
    .social-row { display: flex; gap: 0.75rem; margin-top: 1.8rem; }
    .social-btn {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary); text-decoration: none;
      transition: var(--transition);
    }
    .social-btn:hover {
      background: var(--accent); color: #000;
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    /* Skills */
    .skills-block { margin-top: 0.5rem; }
    .skill-item { margin-bottom: 1.4rem; }
    .skill-header {
      display: flex; justify-content: space-between;
      margin-bottom: 0.45rem;
    }
    .skill-name { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
    .skill-pct { font-size: 0.78rem; color: var(--accent); font-family: var(--font-mono); }
    .skill-track {
      background: var(--bg-elevated);
      border-radius: var(--radius-pill); height: 5px; overflow: hidden;
    }
    .skill-fill {
      height: 100%; border-radius: var(--radius-pill);
      background: linear-gradient(90deg, var(--accent), var(--amber));
      width: 0;
      transition: width 1.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================
       SERVICES
    ============================================ */
    #services {
      background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg-base) 100%);
    }
    .services-head { text-align: center; margin-bottom: 3.5rem; }
    .services-head .section-desc { margin: 0 auto; }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 1.5rem;
    }
    .srv-card {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 2.5rem 2rem;
      transition: var(--transition); position: relative; overflow: hidden;
    }
    .srv-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--amber));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .srv-card:hover {
      transform: translateY(-7px);
      border-color: var(--border);
      box-shadow: var(--shadow-card), var(--shadow-glow);
    }
    .srv-card:hover::before { transform: scaleX(1); }
    .srv-icon {
      width: 52px; height: 52px;
      background: var(--accent-dim); border: 1px solid var(--border);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.35rem; color: var(--accent); margin-bottom: 1.5rem;
    }
    .srv-card h3 {
      font-family: var(--font-display);
      font-size: 1.12rem; font-weight: 700;
      color: var(--text-primary); margin-bottom: 0.75rem;
    }
    .srv-card p {
      color: var(--text-secondary); font-size: 0.92rem;
      line-height: 1.75; margin-bottom: 1.5rem;
    }
    .srv-link {
      display: inline-flex; align-items: center; gap: 0.45rem;
      color: var(--accent); font-size: 0.83rem; font-weight: 600;
      text-decoration: none; transition: gap 0.25s;
    }
    .srv-link:hover { gap: 0.8rem; }

    /* ============================================
       PORTFOLIO
    ============================================ */
    #portfolio { background: var(--bg-base); }
    .portfolio-head { margin-bottom: 3rem; }
    .port-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 1.5rem;
    }
    .port-card {
      border-radius: var(--radius-lg); overflow: hidden;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      transition: var(--transition);
    }
    .port-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-card); }
    .port-img {
      position: relative; overflow: hidden; aspect-ratio: 16/10;
    }
    .port-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.55s ease;
    }
    .port-card:hover .port-img img { transform: scale(1.06); }
    .port-overlay {
      position: absolute; inset: 0;
      background: rgba(7, 9, 15, 0.88);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.4s ease;
      gap: 0.9rem; padding: 1.8rem; text-align: center;
    }
    .port-card:hover .port-overlay { opacity: 1; }
    .port-overlay p { color: var(--text-secondary); font-size: 0.84rem; line-height: 1.7; }
    .view-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--accent); color: #000;
      padding: 0.55rem 1.3rem; border-radius: var(--radius-pill);
      font-weight: 700; font-size: 0.83rem;
      text-decoration: none; transition: var(--transition);
    }
    .view-btn:hover { background: #fff; }
    .port-info { padding: 1.3rem 1.5rem 1.6rem; }
    .port-info h4 {
      font-family: var(--font-display); font-size: 1rem;
      font-weight: 700; color: var(--text-primary); margin-bottom: 0.55rem;
    }
    .port-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .p-tag {
      font-size: 0.68rem; font-family: var(--font-mono);
      color: var(--text-muted); background: var(--bg-elevated);
      padding: 0.2rem 0.65rem; border-radius: var(--radius-pill);
    }

    /* ============================================
       PERFORMANCE
    ============================================ */
    #performance { background: var(--bg-surface); }
    .perf-head { text-align: center; margin-bottom: 3.5rem; }
    .perf-head .section-desc { margin: 0 auto; }
    .perf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .perf-card {
      position: relative; border-radius: var(--radius-lg); overflow: hidden;
      border: 1px solid var(--border-subtle);
      transition: var(--transition); cursor: default;
    }
    .perf-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }
    .perf-card img { width: 100%; display: block; }
    .perf-cover {
      position: absolute; inset: 0;
      background: rgba(7, 9, 15, 0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-
